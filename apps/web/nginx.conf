server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Operator SPA — /app and /app/* must fall back to index.html (hash routes)
    location ^~ /app {
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:3000/;
    }
}
